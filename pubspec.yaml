name: binde_gg
description: BINDE.GG — CS2 Wagering Platform
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ─────────────────────────────────────
  supabase_flutter: ^2.8.0

  # ── Navigation ───────────────────────────────────
  go_router: ^17.1.0

  # ── State Management ─────────────────────────────
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # ── UI / Formatting ─────────────────────────────
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # ── Utilities ────────────────────────────────────
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4

  # ── Windows Desktop ──────────────────────────────
  window_manager: ^0.5.1

  # ── Audio ────────────────────────────────────────
  audioplayers: ^6.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.14
  msix: ^3.16.13

flutter:
  uses-material-design: true
  
